<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="architecture-title architecture-description">
  <title id="architecture-title">PitchForge 評価・改善アーキテクチャ</title>
  <desc id="architecture-description">PitchForgeの入力、評価、改善、成果物生成を示すアーキテクチャ図</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea6a24" />
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#f7f3ea" />
  <g font-family="Arial, Helvetica, sans-serif">
    <text fill="#151515" font-size="32" font-weight="700" text-anchor="start"><tspan x="64" y="58">PitchForge 評価・改善アーキテクチャ</tspan></text>
    <text fill="#5d5952" font-size="16" font-weight="400" text-anchor="start"><tspan x="64" y="96">GitHubからプロダクト情報を取り込み、5観点で評価・改善し、レビュー資料まで仕上げるAIワークス</tspan><tspan x="64" dy="21">ペース。</tspan></text>
    <line x1="64" y1="145" x2="1536" y2="145" stroke="#d7d1c7" />

    <path d="M310 345 H350" fill="none" stroke="#ea6a24" stroke-width="4" marker-end="url(#arrowhead)" />
    <path d="M600 345 H620" fill="none" stroke="#ea6a24" stroke-width="4" marker-end="url(#arrowhead)" />
    <path d="M1170 345 H1190" fill="none" stroke="#ea6a24" stroke-width="4" marker-end="url(#arrowhead)" />

    <path d="M480 480 V548 H505 V568" fill="none" stroke="#7b756c" stroke-width="2" marker-end="url(#arrowhead)" />
    <path d="M515 480 V540 H835 V568" fill="none" stroke="#7b756c" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)" />
    <path d="M550 480 V530 H1165 V568" fill="none" stroke="#7b756c" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)" />

    <g data-section="project-input">
      <rect x="60" y="210" width="250" height="270" rx="18" fill="#ffffff" stroke="#bbb3a7" stroke-width="2" />
      <rect x="60" y="210" width="250" height="10" rx="5" fill="#151515" />
      <text fill="#151515" font-size="18" font-weight="700" text-anchor="start"><tspan x="82" y="254">1. プロダクト入力</tspan></text>
      <text fill="#ea6a24" font-size="22" font-weight="700" text-anchor="start"><tspan x="82" y="289">PitchForge</tspan></text>
      <text fill="#5d5952" font-size="15" font-weight="400" text-anchor="start"><tspan x="82" y="358">公開GitHub URL</tspan><tspan x="82" dy="28">README / ルート設定</tspan><tspan x="82" dy="28">画面素材</tspan></text>
    </g>

    <g data-section="cloud-run">
      <rect x="360" y="210" width="240" height="270" rx="18" fill="#eaf3ff" stroke="#4d8bd6" stroke-width="2" />
      <text fill="#245f9f" font-size="20" font-weight="700" text-anchor="start"><tspan x="382" y="254">2. Cloud Run</tspan></text>
      <text fill="#28445f" font-size="16" font-weight="400" text-anchor="start"><tspan x="382" y="300">Next.js web / API</tspan><tspan x="382" dy="34">Authenticated workspace</tspan><tspan x="382" dy="34">Run orchestration</tspan><tspan x="382" dy="34">Artifact export</tspan></text>
    </g>

    <g data-section="gemini-loop">
      <rect x="630" y="160" width="540" height="370" rx="22" fill="#f0ecff" stroke="#7758bd" stroke-width="2" />
      <text fill="#5d3ba4" font-size="21" font-weight="700" text-anchor="start"><tspan x="656" y="201">3. Gemini AI改善ループ</tspan></text>
      <text fill="#7758bd" font-size="13" font-weight="600" text-anchor="start"><tspan x="656" y="228">Vertex AI / Gemini</tspan></text>

      <rect x="660" y="247" width="110" height="42" rx="12" fill="#ffffff" stroke="#c8b9e8" />
      <rect x="800" y="247" width="125" height="42" rx="12" fill="#ffffff" stroke="#c8b9e8" />
      <rect x="955" y="247" width="130" height="42" rx="12" fill="#ffffff" stroke="#c8b9e8" />
      <text fill="#151515" font-size="14" font-weight="700" text-anchor="middle"><tspan x="715" y="274">理解</tspan></text>
      <text fill="#151515" font-size="13" font-weight="700" text-anchor="middle"><tspan x="862" y="274">5観点評価</tspan></text>
      <text fill="#151515" font-size="14" font-weight="700" text-anchor="middle"><tspan x="1020" y="274">改善設計</tspan></text>
      <text fill="#7758bd" font-size="18" font-weight="700" text-anchor="middle"><tspan x="785" y="274">→</tspan></text>
      <text fill="#7758bd" font-size="18" font-weight="700" text-anchor="middle"><tspan x="940" y="274">→</tspan></text>

      <path d="M1020 289 V303" fill="none" stroke="#7758bd" stroke-width="2" marker-end="url(#arrowhead)" />
      <rect x="660" y="308" width="425" height="42" rx="12" fill="#ffffff" stroke="#c8b9e8" />
      <text fill="#151515" font-size="12" font-weight="700" text-anchor="middle"><tspan x="872" y="335">並列生成: デモ台本 · 紹介文 · ビジュアル案 · 公開チェック</tspan></text>

      <path d="M872 350 V359 H715 V367" fill="none" stroke="#7758bd" stroke-width="2" marker-end="url(#arrowhead)" />
      <rect x="660" y="367" width="110" height="42" rx="12" fill="#ffffff" stroke="#c8b9e8" data-loop-step="draft-judge" />
      <rect x="800" y="367" width="125" height="42" rx="12" fill="#fff4ec" stroke="#ea6a24" data-loop-step="revision-planner" />
      <rect x="955" y="367" width="130" height="42" rx="12" fill="#fff4ec" stroke="#ea6a24" data-loop-step="optimizer-candidate" />
      <text fill="#151515" font-size="13" font-weight="700" text-anchor="middle"><tspan x="715" y="394">成果物評価</tspan></text>
      <text fill="#151515" font-size="11" font-weight="700" text-anchor="middle"><tspan x="862" y="385">改善対象</tspan><tspan x="862" dy="14">を選択</tspan></text>
      <text fill="#151515" font-size="11" font-weight="700" text-anchor="middle"><tspan x="1020" y="385">選択成果物</tspan><tspan x="1020" dy="14">だけ改訂</tspan></text>
      <text fill="#ea6a24" font-size="18" font-weight="700" text-anchor="middle"><tspan x="785" y="394">→</tspan></text>
      <text fill="#ea6a24" font-size="18" font-weight="700" text-anchor="middle"><tspan x="940" y="394">→</tspan></text>

      <path d="M1020 409 V419 H807 V427" fill="none" stroke="#ea6a24" stroke-width="2" marker-end="url(#arrowhead)" />
      <rect x="735" y="427" width="145" height="42" rx="12" fill="#fff4ec" stroke="#ea6a24" data-loop-step="selected-only-merge" />
      <rect x="920" y="427" width="140" height="42" rx="12" fill="#fff4ec" stroke="#ea6a24" data-loop-step="judge-observe" />
      <text fill="#151515" font-size="11" font-weight="700" text-anchor="middle"><tspan x="807" y="444">選択箇所だけ反映</tspan><tspan x="807" dy="14">他は維持</tspan></text>
      <text fill="#151515" font-size="11" font-weight="700" text-anchor="middle"><tspan x="990" y="444">再評価</tspan><tspan x="990" dy="14">変化を確認</tspan></text>
      <text fill="#ea6a24" font-size="18" font-weight="700" text-anchor="middle"><tspan x="900" y="454">→</tspan></text>
      <path data-loop-edge="improved-next-round" d="M990 469 V483 H862 V419" fill="none" stroke="#7758bd" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowhead)" />

      <text fill="#5d3ba4" font-size="11" font-weight="600" text-anchor="start"><tspan x="656" y="499">改善: 採用して次へ · 変化なし: 破棄して停止 · 最大2ラウンド</tspan></text>
      <text fill="#5d5270" font-size="11" font-weight="400" text-anchor="start"><tspan x="656" y="519">判断、実行、再評価、停止までをログで追跡</tspan></text>
    </g>

    <g data-section="improvement-outputs">
      <rect x="1200" y="210" width="340" height="270" rx="18" fill="#fff4ec" stroke="#ea6a24" stroke-width="2" />
      <text fill="#b64c17" font-size="20" font-weight="700" text-anchor="start"><tspan x="1224" y="254">4. 改善成果物</tspan></text>
      <text fill="#603a27" font-size="15" font-weight="400" text-anchor="start"><tspan x="1224" y="300">評価 Before / After</tspan><tspan x="1224" dy="29">デモ台本</tspan><tspan x="1224" dy="29">公開用紹介文</tspan><tspan x="1224" dy="29">ビジュアル案</tspan><tspan x="1224" dy="29">公開前チェック</tspan><tspan x="1224" dy="29">Markdown / JSON</tspan></text>
    </g>

    <g data-section="architecture-note">
      <rect x="60" y="568" width="250" height="122" rx="16" fill="#ffffff" stroke="#d7d1c7" />
      <text fill="#151515" font-size="15" font-weight="700" text-anchor="start"><tspan x="80" y="600">処理の要点</tspan></text>
      <text fill="#5d5952" font-size="12" font-weight="400" text-anchor="start"><tspan x="80" y="628">GitHubから下書きを生成</tspan><tspan x="80" dy="16">5観点で弱点を特定</tspan><tspan x="80" dy="16">選択成果物だけを改訂</tspan></text>
    </g>

    <g data-section="password-auth">
      <rect x="360" y="568" width="290" height="122" rx="16" fill="#ffffff" stroke="#4d8bd6" stroke-width="2" />
      <text fill="#245f9f" font-size="18" font-weight="700" text-anchor="start"><tspan x="382" y="606">パスワード認証</tspan></text>
      <text fill="#4d5964" font-size="14" font-weight="400" text-anchor="start"><tspan x="382" y="638">管理者による事前発行</tspan><tspan x="382" dy="24">署名付きhttpOnlyセッション</tspan></text>
    </g>

    <g data-section="cloud-sql">
      <rect x="690" y="568" width="290" height="122" rx="16" fill="#ffffff" stroke="#4d8bd6" stroke-width="2" />
      <text fill="#245f9f" font-size="18" font-weight="700" text-anchor="start"><tspan x="712" y="606">Cloud SQL / PostgreSQL</tspan></text>
      <text fill="#4d5964" font-size="14" font-weight="400" text-anchor="start"><tspan x="712" y="638">auth_users, login throttle</tspan><tspan x="712" dy="24">Projects, runs, artifacts</tspan></text>
    </g>

    <g data-section="cloud-storage">
      <rect x="1020" y="568" width="290" height="122" rx="16" fill="#ffffff" stroke="#4d8bd6" stroke-width="2" />
      <text fill="#245f9f" font-size="18" font-weight="700" text-anchor="start"><tspan x="1042" y="606">Cloud Storage</tspan></text>
      <text fill="#4d5964" font-size="14" font-weight="400" text-anchor="start"><tspan x="1042" y="638">Screenshots</tspan><tspan x="1042" dy="24">Uploaded project assets</tspan></text>
    </g>

    <text fill="#5d5952" font-size="15" font-weight="700" text-anchor="start"><tspan x="64" y="744">主要技術（重複除外・最大8件）</tspan></text>
    <g data-tech-node="true">
        <rect x="64" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="151" y="806">TypeScript</tspan></text>
      </g>
<g data-tech-node="true">
        <rect x="248" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="335" y="806">Next.js</tspan></text>
      </g>
<g data-tech-node="true">
        <rect x="432" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="519" y="806">React</tspan></text>
      </g>
<g data-tech-node="true">
        <rect x="616" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="703" y="806">Gemini</tspan></text>
      </g>
<g data-tech-node="true">
        <rect x="800" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="887" y="806">Vertex AI</tspan></text>
      </g>
<g data-tech-node="true">
        <rect x="984" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="1071" y="806">Cloud Run</tspan></text>
      </g>
<g data-tech-node="true">
        <rect x="1168" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="1255" y="806">Cloud SQL</tspan></text>
      </g>
<g data-tech-node="true">
        <rect x="1352" y="770" width="174" height="58" rx="12" fill="#ffffff" stroke="#d7d1c7" />
        <text fill="#151515" font-size="14" font-weight="600" text-anchor="middle"><tspan x="1439" y="806">Cloud Storage</tspan></text>
      </g>

    <text fill="#777169" font-size="12" font-weight="400" text-anchor="end"><tspan x="1536" y="870">プロダクト情報とPitchForge成果物から決定的に生成</tspan></text>
  </g>
</svg>