name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    name: lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pitchforge
          POSTGRES_USER: pitchforge
          POSTGRES_PASSWORD: pitchforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pitchforge -d pitchforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_MODE: postgres
      DATABASE_URL: postgres://pitchforge:pitchforge@localhost:5432/pitchforge
      STORAGE_MODE: gcs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: deploy to Cloud Run
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'pitchforge' }}
      AR_REPOSITORY: ${{ vars.AR_REPOSITORY || 'pitchforge' }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}
      DATABASE_URL_SECRET: ${{ vars.DATABASE_URL_SECRET }}
      AUTH_SESSION_SECRET: ${{ vars.AUTH_SESSION_SECRET }}
      CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
      GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION || 'global' }}
      CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy variables
        run: |
          set -euo pipefail

          required=(
            GCP_PROJECT_ID
            GCS_BUCKET
            DATABASE_URL_SECRET
            AUTH_SESSION_SECRET
            CLOUD_SQL_INSTANCE_CONNECTION_NAME
            CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOY_SERVICE_ACCOUNT
          )
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub repository variable: ${name}"
              missing=1
            fi
          done
          if (( missing != 0 )); then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy with Cloud Build
        run: |
          set -euo pipefail

          gcloud builds submit "https://github.com/${GITHUB_REPOSITORY}.git" \
            --project="${GCP_PROJECT_ID}" \
            --config=cloudbuild.yaml \
            --git-source-revision="${GITHUB_SHA}" \
            --substitutions="_REGION=${GCP_REGION},_SERVICE=${CLOUD_RUN_SERVICE},_AR_REPOSITORY=${AR_REPOSITORY},_IMAGE_TAG=${GITHUB_SHA},_GCS_BUCKET=${GCS_BUCKET},_DATABASE_URL_SECRET=${DATABASE_URL_SECRET},_AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET},_CLOUD_SQL_INSTANCE_CONNECTION_NAME=${CLOUD_SQL_INSTANCE_CONNECTION_NAME},_GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION},_CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT=${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT}"

      - name: Smoke test deployed Cloud Run status and readiness
        timeout-minutes: 5
        run: |
          set -euo pipefail

          service_url="$(
            gcloud run services describe "${CLOUD_RUN_SERVICE}" \
              --project="${GCP_PROJECT_ID}" \
              --region="${GCP_REGION}" \
              --platform=managed \
              --format='value(status.url)'
          )"
          if [[ -z "${service_url}" ]]; then
            echo "::error::Cloud Run service URL was not returned after deployment"
            exit 1
          fi

          status_file="$(mktemp)"
          readiness_file="$(mktemp)"
          trap 'rm -f "${status_file}" "${readiness_file}"' EXIT
          curl \
            --silent \
            --show-error \
            --fail \
            --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 90 \
            --retry-all-errors \
            --output "${status_file}" \
            "${service_url%/}/api/system/status"

          if ! jq -e '
            .runtimeMode == "cloud-run" and
            .aiMode == "vertex-gemini" and
            .datastoreMode == "postgres" and
            .storageMode == "gcs" and
            .authMode == "password"
          ' "${status_file}" >/dev/null 2>&1; then
            echo "::error::Cloud Run status did not report the expected production modes"
            exit 1
          fi

          curl \
            --silent \
            --show-error \
            --fail \
            --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 90 \
            --retry-all-errors \
            --output "${readiness_file}" \
            "${service_url%/}/api/system/readiness"

          if ! jq -e '
            .ready == true and
            .checks.database == "ok" and
            .checks.storage == "ok"
          ' "${readiness_file}" >/dev/null 2>&1; then
            echo "::error::Cloud Run readiness checks did not pass"
            exit 1
          fi

          echo "Cloud Run status and readiness smoke tests passed"
