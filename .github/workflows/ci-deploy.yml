name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    name: lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: deploy to Cloud Run
    needs: ci
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.GCP_PROJECT_ID != '' &&
      vars.GCS_BUCKET != '' &&
      vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' &&
      vars.GCP_DEPLOY_SERVICE_ACCOUNT != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'pitchforge' }}
      AR_REPOSITORY: ${{ vars.AR_REPOSITORY || 'pitchforge' }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}
      GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION || 'global' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy variables
        run: |
          required=(
            GCP_PROJECT_ID
            GCS_BUCKET
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOY_SERVICE_ACCOUNT
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub repository variable: ${name}"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy with Cloud Build
        run: |
          gcloud builds submit . \
            --project="${GCP_PROJECT_ID}" \
            --config=cloudbuild.yaml \
            --substitutions="_REGION=${GCP_REGION},_SERVICE=${CLOUD_RUN_SERVICE},_AR_REPOSITORY=${AR_REPOSITORY},_IMAGE_TAG=${GITHUB_SHA},_GCS_BUCKET=${GCS_BUCKET},_GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}"
