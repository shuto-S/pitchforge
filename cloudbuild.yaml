substitutions:
  _REGION: asia-northeast1
  _SERVICE: pitchforge
  _AR_REPOSITORY: pitchforge
  _IMAGE_TAG: manual
  _GCS_BUCKET: replace-with-trigger-substitution
  _GOOGLE_CLOUD_LOCATION: global
  _GEMINI_MODEL: gemini-2.5-flash
  _DATABASE_URL_SECRET: replace-with-trigger-substitution
  _AUTH_SESSION_SECRET: replace-with-trigger-substitution
  _CLOUD_SQL_INSTANCE_CONNECTION_NAME: replace-with-trigger-substitution
  _CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: replace-with-trigger-substitution

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -euo
      - pipefail
      - -c
      - |
        docker build \
          --build-arg "NEXT_PUBLIC_AUTH_MODE=password" \
          -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}" \
          .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - gcloud
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --timeout=900s
      - --max-instances=3
      - --concurrency=4
      - --allow-unauthenticated
      - --service-account=${_CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT}
      - --set-cloudsql-instances=${_CLOUD_SQL_INSTANCE_CONNECTION_NAME}
      - --set-secrets=DATABASE_URL=${_DATABASE_URL_SECRET}:latest,AUTH_SESSION_SECRET=${_AUTH_SESSION_SECRET}:latest
      - --set-env-vars=^|^NEXT_PUBLIC_DEMO_MODE=true|NEXT_PUBLIC_AUTH_MODE=password|AUTH_MODE=password|AI_PROVIDER=gemini|GEMINI_MODEL=${_GEMINI_MODEL}|GOOGLE_GENAI_USE_VERTEXAI=true|GOOGLE_CLOUD_PROJECT=${PROJECT_ID}|GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}|DATABASE_MODE=postgres|STORAGE_MODE=gcs|GCS_BUCKET=${_GCS_BUCKET}|SESSION_COOKIE_NAME=__Host-pitchforge_session_v2|AUTH_BYPASS_FOR_TEST=false

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
