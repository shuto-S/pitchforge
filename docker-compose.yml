name: pitchforge

x-app-environment: &app-environment
  NEXT_PUBLIC_APP_NAME: PitchForge
  NEXT_PUBLIC_DEMO_MODE: "true"
  AI_PROVIDER: mock
  GEMINI_MODEL: gemini-flash-latest
  GOOGLE_GENAI_USE_VERTEXAI: "false"
  DATASTORE_MODE: local
  STORAGE_MODE: local
  LOCAL_DATA_DIR: .local-data
  AUTH_BYPASS_FOR_TEST: "true"
  AUTH_BYPASS_UID: local-user
  AUTH_BYPASS_EMAIL: local-user@example.test
  SESSION_COOKIE_NAME: __session
  NEXT_TELEMETRY_DISABLED: "1"
  WATCHPACK_POLLING: "true"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      <<: *app-environment
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - local_data:/app/.local-data

  lint:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run lint
    environment:
      <<: *app-environment
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - local_data:/app/.local-data

  test:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm test
    environment:
      <<: *app-environment
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - local_data:/app/.local-data

  build:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run build
    environment:
      <<: *app-environment
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - build_next_cache:/app/.next
      - local_data:/app/.local-data

  seed:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run seed:demo
    environment:
      <<: *app-environment
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - local_data:/app/.local-data

volumes:
  node_modules:
  next_cache:
  build_next_cache:
  local_data:
